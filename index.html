月</h2><h3 id="田言"><a href="#田言" class="headerlink" title="田言"></a>田言</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"> 	 	蝙 	面 	湖 	游 	  				未 	身 	与	</span><br><span class="line"> 坠  	无  	蝠 	具 	底 	过 	脚 	岸 	黑 	飞 	来 	遭 	君 	在 	我 </span><br><span class="line"> 落  	悔 	毒 	遮 	静 	滴 	下	边	暗 	渡 	某 	毒 	之 	灰 	用 </span><br><span class="line"> 烈 	自 	蛇 	挡 	卧 	血 	恶	只	复 	幽 	天 	火 	誓 	烬 	灵 </span><br><span class="line"> 焰 	甘 	 				花	影	仇 	冥				最 	魂 </span><br><span class="line"> 灼 	的 	一 	真 	尸 	水 	盛	随	羽 	暗	不 	吞 	勿 	深 	仰 </span><br><span class="line"> 烧 	决 	室 	实 	骸 	流 	放	行	翼 	河	期 	噬 	忘 	处 	望 </span><br><span class="line"> 地 	定 	共 	阳 	白 	腥 					而 	湮 	约 	</span><br><span class="line"> 狱		舞 	光 	骨 	红 					临 	灭 	定 	</span><br><span class="line"></span><br></pre></td></tr></table></figure>
<h3 id="蒙恬与章邯信"><a href="#蒙恬与章邯信" class="headerlink" title="蒙恬与章邯信"></a>蒙恬与章邯信</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"> 禁郎中介台启 海月小筑及春季大祭 </span><br><span class="line"> 兄防卫社稷 御敌杜薇 可谓功高 令人敬拜 </span><br><span class="line"> 皇帝陛下奉先烈之业 平六国之乱 </span><br><span class="line"> 创不世之国 乃天下之幸 </span><br><span class="line"> 然帝国江山如画 久有窥探之辈 欲图染指 </span><br><span class="line"> 公子至北古军中 却中奇毒 处境凶险 </span><br><span class="line"> 可见帝国重器 内忧外患 </span><br><span class="line"> 闻公子扶苏言戌边督军之际 曾得兄警言 </span><br><span class="line"> 蒙恬于千里之外 尤感兄一片赤诚 </span><br><span class="line"> 故斗胆相告 万望慎察 </span><br><span class="line"> 帝国之忧 外有狼族肆虐 尚非心腹之患 </span><br><span class="line"> 而朝内隐疾 却更凶险 鱼目混杂 忠奸莫辩 </span><br><span class="line"> 蒙家世代深受皇恩 虽肝脑涂地无以为报 </span><br><span class="line"> 自当在边关外御强敌 力保公子安危 </span><br><span class="line"> 乞请将军务必为皇帝陛下分忧 亦不枉吾等卑贱之躯 </span><br><span class="line"> 今生以帝国军卒之名立于天地之间 </span><br><span class="line"> 弟蒙恬顿首 </span><br></pre></td></tr></table></figure>
<h2 id="愿你"><a href="#愿你" class="headerlink" title="愿你"></a>愿你</h2><h3 id="给十年后自己的一封信"><a href="#给十年后自己的一封信" class="headerlink" title="给十年后自己的一封信"></a>给十年后自己的一封信</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line"> 亲爱的自己：</span><br><span class="line">    今天想给你写这封信，也不知道十年后你会在哪里，更不知道你能不能收到这封信，在此有一些愿望寄托于你。</span><br><span class="line">    首先希望你平安无事的度过这个黄金的十年，但决不可碌碌无为的度过这十年。因为只有才能出众，才堪当重任；而努力学习，</span><br><span class="line"> 刻苦训练是获得才能的唯一途径。熬得住，出众；熬不住，出局 —— 这就是人生。愿你不饶点滴，不饶自己。以后想要有选择权的 </span><br><span class="line"> 话，从现在开始好好学习，你所做的一切都不为谁，所以一切后果别找理由，独自承担。</span><br><span class="line">    愿你活成自己想成为的模样。不必取悦任何人也不无故讨厌某人。你总是偷偷在意他人的看法，希望你明白，无所谓的东西不用 </span><br><span class="line"> 放在心里，他或她的言论权当呼啸而过的耳旁风罢了。</span><br><span class="line">    愿你学着笑而不语，学着承认不相信，学着接受不尽人意。我知道，你是完美主义者，也许奔流掀不起巨浪，却能收获一颗饱经 </span><br><span class="line"> 沧桑的心和满脸风霜。优于别人，并不高贵；真正的高贵是优于过去的自己。你的人生不会辜负你的，那些转错的弯，那些流下的 </span><br><span class="line"> 泪水，那些滴下的汗水，全都让你成为独一无二的自己。</span><br><span class="line">    愿你一如既往地爱笑。“光阴如电逝难追，百岁开怀能几回。” 很多人会讨厌自己后来的样子，怀念纯真而无忧的从前。但却无能 </span><br><span class="line"> 为力、挣脱不开，于是只能一如既往。一路走来，伴随着有得有失，勿悲勿喜。一路积累下越来越多、越来越深的感触和心中滋味。</span><br><span class="line">    愿你努力 “修行内心”，拥有一份修为。红尘是一场迷乱，人生是一路修行。这修行的法门，也无非是在情绪面前，多从对别人的 </span><br><span class="line"> 指责转向对内心的看顾。在历经岁月磨砺的修行之后，才能拥有一份修为，从此看得见时间的花开花落、云卷云舒。</span><br><span class="line">    愿你长路漫漫，有的是时间发生故事。你总是谨慎，但你要明白慎在于畏小，智在于谋大。希望你已经学会果干，甚至可以有那 </span><br><span class="line"> 么一点 “草莽精神”。可以特立独行，但决不能哗众取宠。也希望你以梦为马，随处可栖，你到的地方一定温暖为你。</span><br><span class="line">    愿你拥有心灵的盔甲。心如朗月照花，深潭蔚蓝，不论顺逆，不论成败，是扬鞭策马、登高临沅的超然；败，仍滴水穿石，汇流 </span><br><span class="line"> 入海，有穷且益坚，不坠青云之志的傲岸，有 “将相本无主，男儿当自强” 的倔强。</span><br><span class="line">    愿你有着西装革履但却方巾阔服；愿你一辈子下来，初心不改；愿你的每次流泪都是喜极而泣；愿你筋疲力尽时，有树可倚；愿 </span><br><span class="line"> 你学会释怀后一身轻；愿你漂泊半生，归来仍是少年。</span><br><span class="line">    不知不觉就写了这么多，希望你别让它们都成为空话。希望你有机会看到这封信时，不会边看边笑说 “当年你怎么这么傻啊！”</span><br><span class="line"> 而是回首那一路上的万千风景，享受着这一刻的静怡，然后露出满足的笑容。未来是什么样就交给你来回答了。</span><br><span class="line"></span><br><span class="line"> 祝：</span><br><span class="line"></span><br><span class="line">    一生久安，岁月无忧！</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">										    	曾经的你 </span><br></pre></td></tr></table></figure>

<h3 id="杂记"><a href="#杂记" class="headerlink" title="杂记"></a>杂记</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">1、时间就是这样；夜里想着心事，第二天的闹铃就响了；下几次雨，夏天就结束了；等反应过来的时候，一年已经快要过去了。</span><br><span class="line">2、本是后山人，偶做前堂客。醉舞经阁半卷书，坐井说天阔。大志戏功名，海斗量福祸。论到囊中羞涩时，怒指乾坤错。</span><br><span class="line">3、忆对中秋丹桂丛，花也杯中，月也杯中。</span><br><span class="line">4、无更犹做钱塘梦，睡觉方知过眼前。</span><br><span class="line">5、喜欢烟花但不敢看烟花绽放，因为我清楚最繁华也是最悲凉。</span><br><span class="line">6、有工作的地方没有家，有家的地方却没有工作，他乡容纳不下灵魂，故乡安置不了肉身，一个叫家的地方找不到养家糊口的路，</span><br><span class="line">  到了养家糊口的地方却安不了家，从此遍有了漂泊，有了远方，有了乡愁！世间若得安稳，谁又愿意颠沛流离？曾经不知道天 </span><br><span class="line">  有多高地有多厚，慢慢的懂得自己不过是尘世间一粒微小的尘埃！</span><br><span class="line">7、君不密则失臣，臣不密则失身，几事不密则成害。</span><br><span class="line"></span><br></pre></td></tr></table></figure>
